services:
  # FastAPI Backend Web Service
  - type: web
    name: pixit-backend
    runtime: docker
    plan: free
    dockerContext: ./fastapi_backend
    dockerfilePath: ./fastapi_backend/Dockerfile
    envVars:
      - key: PORT
        value: 8000
      - key: SQLALCHEMY_DATABASE_URL
        fromDatabase:
          name: pixit-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: '["*"]' # In production, restrict this to your frontend URL
      - key: SECRET_KEY
        generateValue: true

  # React Frontend Static Site
  - type: web
    name: pixit-frontend
    runtime: static
    plan: free
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: pixit-backend
          property: host

databases:
  # Managed PostgreSQL Database
  - name: pixit-db
    databaseName: pixit
    user: pixit_user
    plan: free
