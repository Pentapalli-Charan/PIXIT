services:
  # FastAPI Backend Web Service (Prebuilt Docker Image)
  - type: web
    name: pixit-backend
    runtime: image
    image:
      url: docker.io/charanpentapalli/pixit-backend:latest
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: SQLALCHEMY_DATABASE_URL
        fromDatabase:
          name: pixit-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: '["*"]' # In production, restrict this to your frontend URL
      - key: SECRET_KEY
        generateValue: true

  # React Frontend Web Service (Prebuilt Docker Image)
  - type: web
    name: pixit-frontend
    runtime: image
    image:
      url: docker.io/charanpentapalli/pixit-frontend:latest
    plan: free

databases:
  # Managed PostgreSQL Database
  - name: pixit-db
    databaseName: pixit
    user: pixit_user
    plan: free
