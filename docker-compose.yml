version: '3.8'

services:
  # FastAPI backend service
  backend:
    build:
      context: ./fastapi_backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Persist SQLite database and uploaded images across container restarts
      - pixit_db_data:/app/data
      - pixit_uploads:/app/uploads
    environment:
      - SQLALCHEMY_DATABASE_URL=sqlite:///./data/pixit.db
      - ALLOWED_ORIGINS=["http://localhost:3000", "http://127.0.0.1:3000", "*"]
    env_file:
      - ./fastapi_backend/.env
    networks:
      - pixit_network

  # Nginx-based React frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time argument to let the client browser know where the public backend is
        - VITE_API_URL=http://localhost:${BACKEND_PORT:-8000}
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - pixit_network

  # Prometheus metrics collector
  prometheus:
    build:
      context: ./prometheus
      dockerfile: Dockerfile
    restart: always
    volumes:
      # Persist scraped data across restarts
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - backend
    networks:
      - pixit_network

  # Grafana dashboard visualization
  grafana:
    image: grafana/grafana:10.0.3
    restart: always
    volumes:
      # Persist Grafana dashboards, plugins, and settings
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      # Set default admin credentials for quick access (change in production)
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - pixit_network

  # Node Exporter collects system-level hardware and OS metrics
  node-exporter:
    image: prom/node-exporter:v1.6.1
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      # Prevent exporting filesystems that aren't physical disks
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    networks:
      - pixit_network

  # cAdvisor collects resource usage and performance metrics of running containers
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    ports:
      - "${CADVISOR_PORT:-8082}:8080"
    networks:
      - pixit_network

# Named volumes for persisting data
volumes:
  pixit_db_data:
  pixit_uploads:
  prometheus_data:
  grafana_data:

# Network configuration for container isolation and communication
networks:
  pixit_network:
    driver: bridge
